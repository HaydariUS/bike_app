<!DOCTYPE html>
<html>
<head>
  <title>Rental Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f6f9;
    }
    .rental-entry {
      background: #fff;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 6px solid #4CAF50;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: column;
    }
    small { color: #666; }
    button {
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <h2>📋 Bike Rental Log</h2>
  <div id="rentalLog">Loading...</div>

  <script>
    const apiUrl = "https://script.google.com/macros/s/AKfycbz3XunDGghEu7t_p5T6YZVY73DHYtibPfENGfoIUKsYiAe0gllBO2vpqx0JqsXdcKbU4Q/exec";

    async function loadRentals() {
      try {
        const response = await fetch(apiUrl);
        const rentals = await response.json();

        const logDiv = document.getElementById("rentalLog");
        logDiv.innerHTML = "";

        if (rentals.length === 0) {
          logDiv.innerText = "No rental history.";
          return;
        }

        rentals.forEach(rental => {
          const div = document.createElement("div");
          div.className = "rental-entry";
          div.innerHTML = `
            <p><strong>${rental.name}</strong> (Room: ${rental.room}) rented bikes: ${rental.bikes.join(", ")}</p>
            <p>Status: ${rental.returned ? "Returned at " + rental.returnTime : "Not returned yet"}</p>
          `;
          logDiv.appendChild(div);
        });
      } catch (error) {
        document.getElementById("rentalLog").innerText = "Failed to load data.";
        console.error("Error loading rentals:", error);
      }
    }

    window.onload = loadRentals;
  </script>

</body>
</html>
